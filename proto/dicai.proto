syntax = "proto3";

package dicai;

// Service for provider nodes
service ProviderService {
  // Process input through provider's layers
  rpc Process (ProcessRequest) returns (ProcessResponse);
  
  // Health check
  rpc Health (HealthRequest) returns (HealthResponse);
  
  // Stream processing for better performance with large hidden states
  rpc ProcessStream (stream ProcessRequest) returns (stream ProcessResponse);
}

// Request to process input
message ProcessRequest {
  // Input token IDs (only for first provider)
  repeated int32 input_ids = 1;
  
  // Hidden states from previous provider (for subsequent providers)
  bytes hidden_states = 2;
  
  // Shape of hidden states [batch, seq, hidden_dim]
  repeated int32 hidden_states_shape = 3;
  
  // Provider that should process this request
  string target_provider = 4;
  
  // Request ID for tracing
  string request_id = 5;
}

// Response with processed output
message ProcessResponse {
  // Output hidden states
  bytes hidden_states = 1;
  
  // Shape of output hidden states
  repeated int32 hidden_states_shape = 2;
  
  // Logits (only from last provider)
  bytes logits = 3;
  
  // Shape of logits [batch, seq, vocab_size]
  repeated int32 logits_shape = 4;
  
  // Provider that processed this
  string provider_id = 5;
  
  // Layers processed
  string layers_processed = 6;
  
  // Status
  string status = 7;
  
  // Error message if failed
  string error = 8;
  
  // Request ID for tracing
  string request_id = 9;
}

// Health check request
message HealthRequest {
  string request_id = 1;
}

// Health check response
message HealthResponse {
  string provider_id = 1;
  string status = 2;
  string layers = 3;
  int32 layer_count = 4;
  int64 memory_used_mb = 5;
  int64 memory_total_mb = 6;
  string gpu_info = 7;
}