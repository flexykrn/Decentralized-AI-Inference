version: '3.8'

services:
  # Admin service - model splitter + coordinator
  admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.admin
    ports:
      - "8080:8080"
    volumes:
      - ../models:/app/models:ro
      - ../pytorch_model:/app/pytorch_model
    environment:
      - ADMIN_PORT=8080
      - MODEL_PATH=/app/models
    command: >
      python3 -c "
        print('Admin container ready')
        print('Use this container to split models and coordinate')
        import time
        time.sleep(3600)
      "
    networks:
      - dicai-network

  # Provider 1 - First half of layers
  provider1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.provider
    ports:
      - "50051:50051"
    volumes:
      - ../pytorch_model/provider_0:/app/shard:ro
    environment:
      - PROVIDER_ID=p1
      - START_LAYER=0
      - END_LAYER=10
      - PORT=50051
    command: >
      python3 provider/grpc_provider.py
      --id p1
      --shard-dir /app/shard
      --start-layer 0
      --end-layer 10
      --port 50051
    networks:
      - dicai-network
    depends_on:
      - admin

  # Provider 2 - Second half of layers
  provider2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.provider
    ports:
      - "50052:50051"
    volumes:
      - ../pytorch_model/provider_1:/app/shard:ro
    environment:
      - PROVIDER_ID=p2
      - START_LAYER=11
      - END_LAYER=21
      - PORT=50051
    command: >
      python3 provider/grpc_provider.py
      --id p2
      --shard-dir /app/shard
      --start-layer 11
      --end-layer 21
      --port 50051
    networks:
      - dicai-network
    depends_on:
      - admin

networks:
  dicai-network:
    driver: bridge