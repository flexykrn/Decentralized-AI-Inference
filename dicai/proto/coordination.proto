syntax = "proto3";

package coordination;

option go_package = "github.com/dicai/dicai-admin/proto";
option cpp_namespace = "dicai::proto";

// ProviderRegistration is sent when a provider joins the network
message ProviderRegistration {
  string provider_id = 1;
  string address = 2;
  int32 port = 3;
  int32 memory_gb = 4;
  string backend = 5;  // "mlx", "cuda", "directml", "cpu"
  map<string, string> capabilities = 6;
}

// ProviderHeartbeat is sent periodically to show the provider is alive
message ProviderHeartbeat {
  string provider_id = 1;
  int64 timestamp = 2;
  float cpu_usage = 3;
  float memory_usage = 4;
  int32 active_inferences = 5;
}

// LayerAssignment tells a provider which layers it should host
message LayerAssignment {
  string provider_id = 1;
  string model_id = 2;
  int32 layer_start = 3;
  int32 layer_end = 4;
}

// TopologyUpdate is broadcast when the network topology changes
message TopologyUpdate {
  string model_id = 1;
  repeated LayerAssignment assignments = 2;
  int32 version = 3;
}

// HealthCheck is used to verify a provider is responsive
message HealthCheck {
  string provider_id = 1;
}

// HealthStatus is returned by a provider in response to a health check
message HealthStatus {
  string provider_id = 1;
  string status = 2;  // "healthy", "unhealthy", "offline"
  float latency_ms = 3;
}

// CoordinationService is exposed by the admin coordinator
service CoordinationService {
  rpc Register(ProviderRegistration) returns (LayerAssignment);
  rpc Heartbeat(ProviderHeartbeat) returns (HealthStatus);
  rpc GetTopology(HealthCheck) returns (TopologyUpdate);
}
