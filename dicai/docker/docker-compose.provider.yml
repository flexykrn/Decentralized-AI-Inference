version: '3.8'

services:
  provider:
    build:
      context: ../provider
      dockerfile: ../docker/Dockerfile.provider
    environment:
      - DICAI_ADMIN_URL=http://admin:8080
      - DICAI_PROVIDER_ID=${PROVIDER_ID:-provider1}
      - DICAI_LAYERS=${LAYERS:-0-9}
      - DICAI_BACKEND=${BACKEND:-cpu}
      - DICAI_MEMORY_LIMIT=${MEMORY_LIMIT:-14gb}
    ports:
      - "50051:50051"
      - "50052:50052"
    volumes:
      - provider-cache:/cache
      - provider-models:/models
    networks:
      - dicai-network
    depends_on:
      - admin
    command: ["./dicai-provider", "--admin", "http://admin:8080", "--id", "${PROVIDER_ID:-provider1}"]

volumes:
  provider-cache:
  provider-models:

networks:
  dicai-network:
    external: true
