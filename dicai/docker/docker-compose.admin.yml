version: '3.8'

services:
  admin:
    build:
      context: ../admin
      dockerfile: ../docker/Dockerfile.admin
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - DICAI_ADMIN_PORT=8080
      - DICAI_METRICS_PORT=9090
      - DICAI_LOG_LEVEL=info
    volumes:
      - admin-data:/data
    networks:
      - dicai-network
    command: ["./dicai-admin", "--port", "8080", "--metrics-port", "9090"]

volumes:
  admin-data:

networks:
  dicai-network:
    driver: bridge
