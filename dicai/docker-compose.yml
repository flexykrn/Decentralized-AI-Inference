version: '3.8'

services:
  admin:
    build:
      context: ./admin
      dockerfile: ../docker/Dockerfile.admin
    container_name: dicai-admin
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - DICAI_ADMIN_PORT=8080
      - DICAI_METRICS_PORT=9090
      - DICAI_LOG_LEVEL=info
    volumes:
      - admin-data:/data
    networks:
      - dicai-network
    command: ["./dicai-admin", "--port", "8080", "--metrics-port", "9090"]

  provider-1:
    build:
      context: ./provider
      dockerfile: ../docker/Dockerfile.provider
    container_name: dicai-provider-1
    environment:
      - DICAI_ADMIN_URL=http://admin:8080
      - DICAI_PROVIDER_ID=provider-1
      - DICAI_LAYERS=0-4
      - DICAI_BACKEND=cpu
      - DICAI_MEMORY_LIMIT=14gb
    ports:
      - "50051:50051"
    volumes:
      - provider-cache-1:/cache
      - provider-models-1:/models
    networks:
      - dicai-network
    depends_on:
      - admin
    command: ["./dicai-provider", "--admin", "http://admin:8080", "--id", "provider-1", "--port", "50051"]

  provider-2:
