    "admin": {
      "build": {
        "context": "..",
        "dockerfile": "docker/Dockerfile.admin"
      },
      "ports": [
        "8080:8080"
      ],
      "volumes": [
        "../models:/app/models:ro",
        "../pytorch_model:/app/pytorch_model"
      ],
      "networks": [
        "dicai-network"
      ]
    },
    "p1": {
      "build": {
        "context": "..",
        "dockerfile": "docker/Dockerfile.provider"
      },
      "ports": [
        "50051:50051"
      ],
      "volumes": [
        "../pytorch_model/p1:/app/shard:ro"
      ],
      "environment": {
        "PROVIDER_ID": "p1",
        "START_LAYER": "0",
        "END_LAYER": "1",
        "PORT": "50051"
      },
      "command": [
        "python3",
        "provider/grpc_provider.py",
        "--id",
        "p1",
        "--shard-dir",
        "/app/shard",
        "--start-layer",
        "0",
        "--end-layer",
        "1",
        "--port",
        "50051"
      ],
      "networks": [
        "dicai-network"
      ],
      "depends_on": [
        "admin"
      ]
    },
