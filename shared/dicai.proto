syntax = "proto3";

package dicai;

service TensorService {
  rpc ForwardPass(TensorRequest) returns (TensorResponse);
  rpc HealthCheck(HealthRequest) returns (HealthResponse);
}

message TensorRequest {
  string model_id = 1;
  string request_id = 2;
  bytes tensor_data = 3;
  repeated int32 shape = 4;
  string dtype = 5;
  int32 layer_start = 6;
  int32 layer_end = 7;
}

message TensorResponse {
  string request_id = 1;
  bytes tensor_data = 2;
  repeated int32 shape = 3;
  string dtype = 4;
  bool success = 5;
  string error = 6;
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
  string device_id = 2;
  float memory_used = 3;
  float memory_total = 4;
}