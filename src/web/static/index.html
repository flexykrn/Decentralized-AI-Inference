<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiCAI Admin</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181b21;
      --text: #e6e6e6;
      --muted: #8b929d;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --border: #2a2e36;
      --success: #22c55e;
      --error: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    .subtitle { color: var(--muted); margin-bottom: 24px; }
    .grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .panel h2 {
      margin: 0 0 16px;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .status-row:last-child { border-bottom: none; }
    .status-value { font-weight: 600; }
    .online { color: var(--success); }
    .offline { color: var(--error); }
    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      width: 100%;
      margin-top: 8px;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .code-box {
      background: #0f1115;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-family: monospace;
      font-size: 13px;
      word-break: break-all;
      margin-top: 8px;
      display: none;
    }
    .provider-item {
      padding: 12px;
      background: #0f1115;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .provider-id { font-weight: 600; }
    .provider-meta { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .chat {
      display: flex;
      flex-direction: column;
      height: 600px;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #0f1115;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .message {
      margin-bottom: 16px;
      max-width: 80%;
    }
    .message.user { margin-left: auto; }
    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      background: var(--border);
    }
    .message.user .bubble { background: var(--accent); }
    .message .role {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .chat-input {
      display: flex;
      gap: 8px;
    }
    .chat-input input {
      flex: 1;
      background: #0f1115;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
    }
    .chat-input button { width: auto; margin-top: 0; }
    .empty { color: var(--muted); text-align: center; margin-top: 40px; }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .api-key {
      font-family: monospace;
      font-size: 12px;
      background: #0f1115;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>DiCAI Admin Dashboard</h1>
    <div class="subtitle">Distributed AI inference network control panel</div>

    <div class="grid">
      <div class="sidebar">
        <div class="panel">
          <h2>Network Status</h2>
          <div class="status-row">
            <span>Status</span>
            <span id="status" class="status-value offline">Checking...</span>
          </div>
          <div class="status-row">
            <span>Providers</span>
            <span id="provider-count" class="status-value">0</span>
          </div>
          <div class="status-row">
            <span>Route Version</span>
            <span id="route-version" class="status-value">-</span>
          </div>
        </div>

        <div class="panel">
          <h2>Invite Codes</h2>
          <button onclick="generateCode()">Generate Provider Code</button>
          <div id="code-box" class="code-box"></div>
        </div>

        <div class="panel">
          <h2>API Key</h2>
          <div id="api-key" class="api-key">Loading...</div>
        </div>

        <div class="panel">
          <h2>Providers</h2>
          <div id="providers">No providers registered</div>
        </div>
      </div>

      <div class="panel chat">
        <h2>Chat</h2>
        <div id="messages" class="chat-messages">
          <div class="empty">Start a conversation below</div>
        </div>
        <div class="chat-input">
          <input id="prompt" type="text" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()">
          <button onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '';
    let apiKey = '';

    async function init() {
      await fetchApiKey();
      refreshStatus();
      setInterval(refreshStatus, 5000);
    }

    async function fetchApiKey() {
      try {
        const res = await fetch(`${API_BASE}/admin/keys`, { method: 'POST' });
        const data = await res.json();
        apiKey = data.key;
        document.getElementById('api-key').textContent = apiKey;
      } catch (e) {
        document.getElementById('api-key').textContent = 'Error loading key';
      }
    }

    async function refreshStatus() {
      try {
        const res = await fetch(`${API_BASE}/status`);
        const data = await res.json();
        document.getElementById('status').textContent = 'Healthy';
        document.getElementById('status').className = 'status-value online';
        document.getElementById('provider-count').textContent = data.providers;
        document.getElementById('route-version').textContent = data.version;
        renderProviders(data.route || []);
      } catch (e) {
        document.getElementById('status').textContent = 'Offline';
        document.getElementById('status').className = 'status-value offline';
      }
    }

    function renderProviders(route) {
      const container = document.getElementById('providers');
      if (!route.length) {
        container.innerHTML = 'No providers registered';
        return;
      }
      container.innerHTML = route.map(p => `
        <div class="provider-item">
          <div class="provider-id">${p.provider_id}</div>
          <div class="provider-meta">Layers ${p.start_layer}-${p.end_layer}</div>
        </div>
      `).join('');
    }

    async function generateCode() {
      try {
        const res = await fetch(`${API_BASE}/code`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ admin_secret: 'admin' })
        });
        const data = await res.json();
        const box = document.getElementById('code-box');
        box.textContent = data.code;
        box.style.display = 'block';
      } catch (e) {
        alert('Failed to generate code');
      }
    }

    async function sendMessage() {
      const input = document.getElementById('prompt');
      const text = input.value.trim();
      if (!text) return;

      addMessage('user', text);
      input.value = '';

      const messagesDiv = document.getElementById('messages');
      const loadingId = 'loading-' + Date.now();
      const loadingDiv = document.createElement('div');
      loadingDiv.id = loadingId;
      loadingDiv.className = 'message';
      loadingDiv.innerHTML = '<div class="role">Assistant</div><div class="bubble">Thinking<span class="spinner"></span></div>';
      messagesDiv.appendChild(loadingDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      try {
        const res = await fetch(`${API_BASE}/v1/chat/completions`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: 'dicai-7b',
            messages: [{ role: 'user', content: text }],
            max_tokens: 50
          })
        });
        const data = await res.json();
        const reply = data.choices?.[0]?.message?.content || 'Error';
        document.getElementById(loadingId).remove();
        addMessage('assistant', reply);
      } catch (e) {
        document.getElementById(loadingId).remove();
        addMessage('assistant', 'Error: ' + e.message);
      }
    }

    function addMessage(role, text) {
      const messagesDiv = document.getElementById('messages');
      if (messagesDiv.querySelector('.empty')) messagesDiv.innerHTML = '';
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.innerHTML = `<div class="role">${role === 'user' ? 'You' : 'Assistant'}</div><div class="bubble">${escapeHtml(text)}</div>`;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    init();
  </script>
</body>
</html>
